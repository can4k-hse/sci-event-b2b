version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: scievent
      POSTGRES_PASSWORD: scievent
      POSTGRES_DB: scievent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scievent"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/b2c-api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./apps/b2c-api/.env
    ports:
      - "8080:8080"
    volumes:
      - ./apps/b2c-api:/app
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
      "

volumes:
  pgdata:
